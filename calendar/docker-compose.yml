version: '3.8'

services:
  backend:
    build: ./backend/
    ports:
      - "5000:5000"
    volumes:
      - ./backend/instance:/app/instance # Persist SQLite database
    environment:
      FLASK_APP: app.py
      FLASK_ENV: development

  frontend:
    build: ./frontend
    ports:
      - "90:80"
    depends_on:
      - backend # Frontend needs backend API to function
